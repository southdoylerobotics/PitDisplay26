<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3824 Pit Display 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --gold: #ffc107;
            --red: #ff4d4d; --blue: #4d94ff; --text: #eee;
        }
        /* Lock the screen to prevent scrolling */
        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0; 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; overflow: hidden; 
        }
        .main-wrapper {
            display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; gap: 10px;
        }
        .header {
            flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); padding: 10px 20px; border-radius: 8px; border-bottom: 3px solid var(--gold);
        }
        .win-prob-container { width: 300px; text-align: center; }
        .prob-bar { width: 100%; height: 18px; background: #333; border-radius: 9px; overflow: hidden; display: flex; margin: 5px 0; }
        
        /* Dashboard Grid */
        .dashboard-grid {
            flex: 1; display: grid; grid-template-columns: 1.2fr 0.8fr; grid-template-rows: 1fr 1fr; gap: 10px; min-height: 0;
        }
        .card {
            background: var(--card); padding: 12px; border-radius: 8px; 
            display: flex; flex-direction: column; min-height: 0; position: relative;
        }
        .chart-container { flex: 1; position: relative; min-height: 0; width: 100%; }
        
        /* Citrus Badges */
        .badge-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; min-height: 0; }
        .citrus-badge { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-radius: 6px; font-weight: bold; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); 
        }
        h1 { margin: 0; font-size: 1.4rem; color: var(--gold); }
        h3 { margin: 0 0 8px 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .red-t { color: var(--red); } .blue-t { color: var(--blue); }
        #status-text { font-size: 0.7rem; color: #777; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <div>
            <h1>3824 STRATEGY</h1>
            <span id="status-text">Syncing...</span>
        </div>
        <div class="win-prob-container">
            <div style="display:flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;">
                <span class="red-t">RED: <span id="r-epa">0</span></span>
                <span class="blue-t">BLUE: <span id="b-epa">0</span></span>
            </div>
            <div class="prob-bar">
                <div id="r-fill" style="width: 50%; background: var(--red); transition: 1s;"></div>
                <div id="b-fill" style="width: 50%; background: var(--blue); transition: 1s;"></div>
            </div>
            <div style="display:flex; justify-content: space-between; font-size: 0.7rem;">
                <span id="r-prob">50%</span><span id="b-prob">50%</span>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Alliance Scoring Potential</h3>
            <div class="chart-container"><canvas id="scoreChart"></canvas></div>
        </div>
        <div class="card">
            <h3>Navigation (Bump vs Trench)</h3>
            <div class="chart-container"><canvas id="navChart"></canvas></div>
        </div>
        <div class="card">
            <h3 class="red-t">Red Alliance Citrus Quality</h3>
            <div id="red-citrus" class="badge-grid"></div>
        </div>
        <div class="card">
            <h3 class="blue-t">Blue Alliance Citrus Quality</h3>
            <div id="blue-citrus" class="badge-grid"></div>
        </div>
    </div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=131746992&single=true&output=csv";
    let charts = {};

    function getGreen(r) {
        return r >= 2.6 ? "#1b5e20" : r >= 1.8 ? "#4caf50" : "#81c784";
    }

    async function update() {
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            const data = Papa.parse(csv, {header:true, dynamicTyping:true, skipEmptyLines:true}).data;

            // Update Match Teams Here
            const red = [16, 8044, 2183]; const blue = [3824, 3468, 2221];
            const allTeams = [...red, ...blue];

            const matchData = allTeams.map(n => {
                return data.find(t => t['Team Number'] == n) || 
                {"Avg Auto":0,"Avg Teleop":0,"Avg Endgame":0,"Avg Total":0,"Bump %":0,"Trench %":0,"Avg Citrus":1};
            });

            const rEPA = matchData.slice(0,3).reduce((s, t) => s + (t['Avg Total'] || 0), 0);
            const bEPA = matchData.slice(3,6).reduce((s, t) => s + (t['Avg Total'] || 0), 0);
            
            // Win Prob Logic
            const diff = rEPA - bEPA;
            const rP = Math.round((1 / (1 + Math.pow(10, (-diff / 65)))) * 100);
            document.getElementById('r-epa').innerText = rEPA.toFixed(1);
            document.getElementById('b-epa').innerText = bEPA.toFixed(1);
            document.getElementById('r-fill').style.width = rP + "%";
            document.getElementById('b-fill').style.width = (100-rP) + "%";
            document.getElementById('r-prob').innerText = rP + "%";
            document.getElementById('b-prob').innerText = (100-rP) + "%";

            render(allTeams, matchData);
            badges(red, blue, data);
            document.getElementById('status-text').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        } catch (e) { document.getElementById('status-text').innerText = "OFFLINE"; }
    }

        const cfg = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff', font: {size: 10}}}}};
