<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6517 Strategy & Pit Alerts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="matches/manifest.js"></script>

    <style>
        :root {
            --bg-color: #080808; --card-bg: #141414;
            --red-alliance: #ff4d4d; --blue-alliance: #4d94ff;
            --gold: #ffc107; --text: #ffffff;
            /* Severity Colors */
            --sev-1: #0056b3; --sev-2: #1e7e34; --sev-3: #d97706; --sev-4: #bd2130; --sev-5: #000000;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        /* --- PIT ALERT OVERLAY --- */
        .alert-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10000; display: none; justify-content: center; align-items: center;
            border: 20px solid white; transition: background-color 0.4s;
        }
        .alert-content { width: 90%; max-height: 95vh; display: flex; flex-direction: column; align-items: center; text-align: center; }
        #alert-issue-box { width: 100%; max-height: 55vh; overflow-y: auto; margin: 10px 0; padding: 10px; }
        #alert-issue-text {
            font-size: clamp(2rem, 6vw, 8rem); font-weight: 900; color: white;
            line-height: 1.1; text-transform: uppercase; word-wrap: break-word;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .sev-badge {
            background: white; color: black; padding: 10px 60px; border-radius: 100px;
            font-size: 6rem; font-weight: 900; margin: 10px 0; display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .alert-dismiss { 
            font-size: 2.5rem; padding: 20px 80px; cursor: pointer; background: white; 
            color: black; border: none; font-weight: bold; border-radius: 10px; margin-top: 20px;
        }

        /* --- DASHBOARD STYLES --- */
        .nav-tabs { display: flex; background: #1a1a1a; border-bottom: 2px solid var(--gold); padding: 5px 10px; gap: 10px; }
        .tab-btn { background: #333; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }
        
        .dashboard-wrapper { display: flex; flex-direction: column; width: 100%; height: calc(100% - 45px); padding: 8px; gap: 8px; }
        .header { flex: none; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 8px 15px; border-radius: 6px; border-bottom: 3px solid var(--gold); }
        .match-select { padding: 4px; border-radius: 4px; background: #222; color: white; border: 1px solid var(--gold); font-weight: bold; }
        
        .win-prob-container { width: 300px; text-align: center; }
        .prob-bar { width: 100%; height: 16px; background: #333; border-radius: 8px; overflow: hidden; display: flex; margin: 4px 0; }
        .live-banner { flex: none; background: #1f1f1f; color: var(--text); border-radius: 6px; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; font-weight: bold; font-size: 1.1rem; }
        
        .warning-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; animation: fullScreenFlash 1s infinite; background: rgba(0, 0, 0, 0.85); }
        @keyframes fullScreenFlash { 0% { background-color: rgba(211, 47, 47, 0.95); } 50% { background-color: rgba(255, 82, 82, 0.95); } 100% { background-color: rgba(211, 47, 47, 0.95); } }
        
        .content-grid { flex: 1 1 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1.2fr 0.8fr; gap: 8px; min-height: 0; }
        .card { background: var(--card-bg); padding: 10px; border-radius: 6px; display: flex; flex-direction: column; min-height: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .combined-card { grid-column: 1 / -1; } .red-card { border-left: 4px solid var(--red-alliance); } .blue-card { border-left: 4px solid var(--blue-alliance); }
        
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; text-align: center; }
        .data-table th { background: rgba(255,255,255,0.1); padding: 4px; border-bottom: 2px solid #555; color: #ccc; font-size: 0.8em; }
        .chart-container { flex: 1 1 0; position: relative; width: 100%; height: 100%; }
        .bottom-row-content { display: flex; flex: 1 1 0; gap: 8px; }
        .badge-grid { flex: 0 0 115px; display: grid; grid-template-rows: repeat(3, 1fr); gap: 4px; }
        .death-grid { flex: 0 0 50px; display: grid; grid-template-rows: repeat(3, 1fr); gap: 4px; }
        .citrus-badge, .death-badge { display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 4px; font-weight: bold; background: #1b5e20; }
        .death-badge { background: #b71c1c; }

        #video-review-tab { display: none; height: 100%; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

    <div id="match-alert-overlay" class="alert-overlay">
        <div class="alert-content">
            <p style="color: rgba(255,255,255,0.8); letter-spacing: 15px; margin: 0; font-weight: bold;">PIT ALERT</p>
            <div id="alert-issue-box"><div id="alert-issue-text">LOADING...</div></div>
            <div id="alert-sev-badge" class="sev-badge">#</div>
            <button class="alert-dismiss" onclick="dismissPitAlert()">ACKNOWLEDGE</button>
        </div>
    </div>

    <div id="full-screen-warning" class="warning-overlay" style="display: none;">
        <div style="text-align: center;">
            <h1 style="font-size: 6rem; margin: 0; color: white;">TIME TO QUEUE!</h1>
            <h2 style="font-size: 3rem;">MATCHES AWAY: <span id="warning-matches-away">--</span></h2>
            <button onclick="dismissWarning()" style="font-size: 3rem; padding: 20px 50px; border-radius: 10px; cursor: pointer;">ON OUR WAY!</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('strategy')">STRATEGY DASHBOARD</button>
        <button class="tab-btn" onclick="switchTab('video')">MATCH VIDEO REVIEW</button>
    </div>

    <div id="strategy-tab" class="dashboard-wrapper">
        <div class="header">
            <div>
                <h1 style="margin:0; color:var(--gold); font-size:1.2rem;">6517 STRATEGY</h1>
                <select id="match-selector" class="match-select" onchange="handleManualSelection()"></select>
                <span id="status-text" style="font-size:0.7em; color:#777; margin-left:10px;">Syncing...</span>
            </div>
            <div class="win-prob-container">
                <div class="prob-bar"><div id="red-fill" style="width:50%; background:var(--red-alliance); transition:1s;"></div><div id="blue-fill" style="width:50%; background:var(--blue-alliance); transition:1s;"></div></div>
                <div style="display:flex; justify-content: space-between; font-size:0.8em;"><span id="red-prob-text">-- EPA</span><span id="blue-prob-text">-- EPA</span></div>
            </div>
        </div>

        <div id="live-banner" class="live-banner">
            <div>Field Match: <span id="field-match" style="color:var(--gold);">--</span> | Next 6517: <span id="target-match" style="color:var(--gold);">--</span> <span id="bumper-color" style="margin-left:15px;"></span></div>
            <div>MATCHES AWAY: <span id="matches-away">--</span></div>
        </div>

        <div class="content-grid">
            <div class="card combined-card">
                <h3>Alliance Potential Breakdown</h3>
                <div class="chart-container"><canvas id="combinedScoringChart"></canvas></div>
            </div>
            <div class="card red-card">
                <h3 class="red-text">Red Alliance</h3>
                <table class="data-table"><thead><tr><th>Team</th><th>Auto</th><th>Tele</th><th>End</th><th>Total</th></tr></thead><tbody id="red-table-body"></tbody></table>
            </div>
            <div class="card blue-card">
                <h3 class="blue-text">Blue Alliance</h3>
                <table class="data-table"><thead><tr><th>Team</th><th>Auto</th><th>Tele</th><th>End</th><th>Total</th></tr></thead><tbody id="blue-table-body"></tbody></table>
            </div>
            <div class="card red-card">
                <div class="bottom-row-content">
                    <div class="chart-container"><canvas id="redNavChart"></canvas></div>
                    <div id="red-deaths" class="death-grid"></div>
                    <div id="red-citrus" class="badge-grid"></div>
                </div>
            </div>
            <div class="card blue-card">
                <div class="bottom-row-content">
                    <div class="chart-container"><canvas id="blueNavChart"></canvas></div>
                    <div id="blue-deaths" class="death-grid"></div>
                    <div id="blue-citrus" class="badge-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="video-review-tab" class="dashboard-wrapper">
        <h2 style="color:var(--gold)">Video Review System Active</h2>
    </div>

    <script>
        const TEAM_NUMBER = 6517;
        const AVERAGES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=131746992&single=true&output=csv";
        const LIVE_EXPORT_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=373862560&single=true&output=csv";
        const TBA_MATCHES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=863329017&single=true&output=csv";
        const STATBOTICS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=1460216648&single=true&output=csv";
        const ALERTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=307525301&single=true&output=csv";
        const TBA_RANKINGS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=1866660804&single=true&output=csv";

        let charts = {}, teamDataCache = [], scheduleData = [], epaDataCache = [], rankingsDataCache = [], userManuallySelected = false, dismissedMatch = -1;

        async function fetchData() {
            try {
                const ts = `&t=${Date.now()}`;
                const [avgRes, liveRes, tbaRes, epaRes, rankRes] = await Promise.all([
                    fetch(AVERAGES_URL + ts), fetch(LIVE_EXPORT_URL + ts), fetch(TBA_MATCHES_URL + ts), fetch(STATBOTICS_URL + ts), fetch(TBA_RANKINGS_URL + ts)
                ]);

                teamDataCache = Papa.parse(await avgRes.text(), { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
                epaDataCache = Papa.parse(await epaRes.text(), { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
                rankingsDataCache = Papa.parse(await rankRes.text(), { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
                const liveData = Papa.parse(await liveRes.text(), { header: true, dynamicTyping: true, skipEmptyLines: true }).data;
                const tbaData = Papa.parse(await tbaRes.text(), { header: true, dynamicTyping: true, skipEmptyLines: true }).data;

                if (liveData.length && tbaData.length) {
                    processLiveSchedule(liveData, tbaData);
                    updateDashboard();
                }
                checkPitAlerts();
            } catch (e) { console.error(e); }
        }

        async function checkPitAlerts() {
            try {
                const res = await fetch(ALERTS_URL + `&t=${Date.now()}`);
                const data = Papa.parse(await res.text(), { header: true, skipEmptyLines: true }).data;
                if (data.length > 0) {
                    const latestIdx = data.length - 1;
                    const lastAck = localStorage.getItem('lastAckAlertRow');
                    if (lastAck === null || parseInt(lastAck) < latestIdx) {
                        triggerAlertUI(data[latestIdx], latestIdx);
                    }
                }
            } catch (err) { console.error(err); }
        }

        function triggerAlertUI(alert, rowIndex) {
            const overlay = document.getElementById('match-alert-overlay');
            if (overlay.style.display === "flex") return;
            const sev = String(alert['Severity #']).trim();
            document.getElementById('alert-issue-text').innerText = (alert['Issue'] || "NO ISSUE").toUpperCase();
            document.getElementById('alert-sev-badge').innerText = sev;
            let bg = "var(--bg-color)", border = "white";
            if (sev === "1") bg = "var(--sev-1)";
            else if (sev === "2") bg = "var(--sev-2)";
            else if (sev === "3") bg = "var(--sev-3)";
            else if (sev === "4") bg = "var(--sev-4)";
            else if (sev === "5") { bg = "var(--sev-5)"; border = "var(--gold)"; }
            overlay.style.backgroundColor = bg;
            overlay.style.borderColor = border;
            overlay.dataset.rowIndex = rowIndex;
            overlay.style.display = "flex";
        }

        function dismissPitAlert() {
            const overlay = document.getElementById('match-alert-overlay');
            localStorage.setItem('lastAckAlertRow', overlay.dataset.rowIndex);
            overlay.style.display = "none";
        }

        function processLiveSchedule(liveData, tbaData) {
            const fieldMatch = String(liveData[0]['Current Match Number'] || '');
            const matchesAway = Number(liveData[0]['Matches Until 6517']) || 0;
            const currentMatchNum = parseInt(fieldMatch.match(/\d+/) || [0]);
            const targetMatchNum = currentMatchNum + matchesAway;

            document.getElementById('field-match').innerText = fieldMatch;
            document.getElementById('matches-away').innerText = matchesAway;
            document.getElementById('target-match').innerText = targetMatchNum;
            document.getElementById('warning-matches-away').innerText = matchesAway;

            scheduleData = tbaData.map(row => ({
                id: Number(row['Match Number']),
                redTeams: [Number(row['Red 1']), Number(row['Red 2']), Number(row['Red 3'])],
                blueTeams: [Number(row['Blue 1']), Number(row['Blue 2']), Number(row['Blue 3'])]
            })).filter(m => m.id);

            const selector = document.getElementById('match-selector');
            if (!userManuallySelected) {
                selector.innerHTML = scheduleData.map(m => `<option value="${m.id}">Match ${m.id}</option>`).join('');
                selector.value = targetMatchNum;
            }

            const currentMatch = scheduleData.find(m => m.id === targetMatchNum);
            const bumper = document.getElementById('bumper-color');
            if (currentMatch) {
                if (currentMatch.redTeams.includes(TEAM_NUMBER)) { bumper.innerText = "[RED]"; bumper.style.color = "var(--red-alliance)"; }
                else if (currentMatch.blueTeams.includes(TEAM_NUMBER)) { bumper.innerText = "[BLUE]"; bumper.style.color = "var(--blue-alliance)"; }
            }

            if (matchesAway <= 2 && matchesAway >= 0 && dismissedMatch !== targetMatchNum) {
                document.getElementById('full-screen-warning').style.display = "flex";
            }
        }

        function dismissWarning() {
            dismissedMatch = parseInt(document.getElementById('target-match').innerText);
            document.getElementById('full-screen-warning').style.display = "none";
        }

        function handleManualSelection() { userManuallySelected = true; updateDashboard(); }

        function updateDashboard() {
            const matchId = document.getElementById('match-selector').value;
            const match = scheduleData.find(m => m.id == matchId);
            if (!match) return;

            const getT = (n) => teamDataCache.find(t => Number(t['Team Number']) === n) || {"Avg Auto":0,"Avg Teleop":0,"Avg Endgame":0,"Avg Total":0,"Avg Citrus":1};
            const getRank = (n) => rankingsDataCache.find(t => Number(t['Team']) === n) || { Rank: '--' };
            const getEPA = (n) => { const t = epaDataCache.find(x => Number(x['Team']) === n); return t ? Number(t['Total EPA']) : 0; };

            const rD = match.redTeams.map(getT); const bD = match.blueTeams.map(getT);
            const rEPA = match.redTeams.reduce((s, n) => s + getEPA(n), 0);
            const bEPA = match.blueTeams.reduce((s, n) => s + getEPA(n), 0);

            document.getElementById('red-fill').style.width = (rEPA / (rEPA + bEPA) * 100) + "%";
            document.getElementById('blue-fill').style.width = (bEPA / (rEPA + bEPA) * 100) + "%";
            document.getElementById('red-prob-text').innerText = rEPA.toFixed(1) + " EPA";
            document.getElementById('blue-prob-text').innerText = bEPA.toFixed(1) + " EPA";

            renderTable('red-table-body', match.redTeams, rD);
            renderTable('blue-table-body', match.blueTeams, bD);
            renderCharts(rD, bD, match.redTeams, match.blueTeams);
            drawBadges(match.redTeams, 'red-citrus', 'red-deaths', getT, getRank);
            drawBadges(match.blueTeams, 'blue-citrus', 'blue-deaths', getT, getRank);
        }

        function renderTable(id, teams, data) {
            document.getElementById(id).innerHTML = teams.map((n, i) => {
                const d = data[i];
                return `<tr><td style="color:var(--gold); font-weight:bold;">${n}</td><td>${(d['Avg Auto']||0).toFixed(1)}</td><td>${(d['Avg Teleop']||0).toFixed(1)}</td><td>${(d['Avg Endgame']||0).toFixed(1)}</td><td>${(d['Avg Total']||0).toFixed(1)}</td></tr>`;
            }).join('');
        }

        function renderCharts(rD, bD, rL, bL) {
            if(charts.comb) charts.comb.destroy(); if(charts.rN) charts.rN.destroy(); if(charts.bN) charts.bN.destroy();
            const sum = (d, k) => d.reduce((s, t) => s + (parseFloat(t[k]) || 0), 0);
            charts.comb = new Chart(document.getElementById('combinedScoringChart'), {
                type: 'bar', data: { labels: ['Red', 'Blue'], datasets: [
                    { label: 'Auto', data: [sum(rD, 'Avg Auto'), sum(bD, 'Avg Auto')], backgroundColor: '#FFD700' },
                    { label: 'Tele', data: [sum(rD, 'Avg Teleop'), sum(bD, 'Avg Teleop')], backgroundColor: '#42a5f5' },
                    { label: 'End', data: [sum(rD, 'Avg Endgame'), sum(bD, 'Avg Endgame')], backgroundColor: '#66bb6a' }
                ]}, options: { responsive: true, maintainAspectRatio: false }
            });
            const nav = (id, labs, dat) => new Chart(document.getElementById(id), {
                type: 'bar', data: { labels: labs, datasets: [
                    { label: 'Bump', data: dat.map(d => (parseFloat(d['Bump %']) || 0) * 100), backgroundColor: '#ef5350' },
                    { label: 'Trench', data: dat.map(d => (parseFloat(d['Trench %']) || 0) * 100), backgroundColor: '#ab47bc' }
                ]}, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { max: 100 }} }
            });
            charts.rN = nav('redNavChart', rL, rD); charts.bN = nav('blueNavChart', bL, bD);
        }

        function drawBadges(list, citrusId, deathsId, getT, getRank) {
            const cEl = document.getElementById(citrusId); cEl.innerHTML = '';
            const dEl = document.getElementById(deathsId); dEl.innerHTML = '';
            list.forEach(n => {
                const t = getT(n); const r = getRank(n);
                cEl.innerHTML += `<div class="citrus-badge"><div>T-${n}</div><div>Rnk: ${r.Rank}</div><div>Cit: ${parseFloat(t["Avg Citrus"]||1).toFixed(1)}</div></div>`;
                dEl.innerHTML += `<div class="death-badge"><span>Died</span><span>${parseInt(t["Total Times Died"])||0}</span></div>`;
            });
        }

        function switchTab(tab) {
            document.getElementById('strategy-tab').style.display = tab === 'strategy' ? 'flex' : 'none';
            document.getElementById('video-review-tab').style.display = tab === 'video' ? 'flex' : 'none';
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab === 'strategy' && i === 0) || (tab === 'video' && i === 1)));
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
