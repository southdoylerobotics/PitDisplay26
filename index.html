<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6517 Pit Strategy & Alerts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #080808; 
            --card-bg: #141414;
            --gold: #ffc107; 
            --text: #ffffff;
            /* Severity Colors */
            --sev-1: #0056b3; /* Blue */
            --sev-2: #1e7e34; /* Green */
            --sev-3: #d97706; /* Orange */
            --sev-4: #bd2130; /* Red */
            --sev-5: #000000; /* Black */
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: var(--bg-color); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* --- PIT ALERT OVERLAY --- */
        .alert-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10000; display: none; justify-content: center; align-items: center;
            border: 20px solid white; /* Default border */
            transition: background-color 0.5s ease;
        }

        .alert-content { 
            width: 90%; max-height: 95vh; display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        
        .alert-header-label {
            color: rgba(255,255,255,0.8); letter-spacing: 15px; margin: 0; font-weight: bold; font-size: 1.2rem;
        }

        /* ISSUE TEXT: Scalable and scrollable */
        #alert-issue-box {
            width: 100%; max-height: 55vh; overflow-y: auto; margin: 20px 0; padding: 10px;
            scrollbar-width: thin;
        }
        #alert-issue-text {
            font-size: clamp(2rem, 7vw, 9rem); font-weight: 900; color: white;
            line-height: 1; text-transform: uppercase; word-wrap: break-word; overflow-wrap: anywhere;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* SEVERITY BADGE: Simple but massive */
        .sev-badge {
            background: white; color: black; padding: 10px 60px; border-radius: 100px;
            font-size: 6rem; font-weight: 900; margin: 10px 0; display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .alert-dismiss { 
            font-size: 2rem; padding: 15px 60px; cursor: pointer; background: white; 
            color: black; border: none; font-weight: bold; border-radius: 10px; margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .alert-dismiss:active { transform: scale(0.95); }

        /* --- DASHBOARD STYLES (Placeholder for your main UI) --- */
        .dashboard-wrapper { padding: 20px; display: flex; flex-direction: column; height: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); padding-bottom: 10px; }
        #status-text { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

    <div id="match-alert-overlay" class="alert-overlay">
        <div class="alert-content">
            <p class="alert-header-label">NEW PIT ALERT</p>
            
            <div id="alert-issue-box">
                <div id="alert-issue-text">LOADING ISSUE...</div>
            </div>

            <div id="alert-sev-badge" class="sev-badge">#</div>

            <button class="alert-dismiss" onclick="dismissPitAlert()">ACKNOWLEDGE</button>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <div class="header">
            <h1 style="margin:0; color:var(--gold);">6517 STRATEGY</h1>
            <div id="status-text">Syncing data...</div>
        </div>
        <div style="margin-top: 20px; color: #444; font-style: italic;">
            Main Dashboard active. Alerts will override this screen.
        </div>
    </div>

    <script>
        const ALERTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=307525301&single=true&output=csv";
        
        let autoDismissTimer = null;

        async function checkPitAlerts() {
            try {
                // Cache-buster URL
                const res = await fetch(ALERTS_URL + `&t=${Date.now()}`);
                const csvText = await res.text();
                const data = Papa.parse(csvText, { header: true, skipEmptyLines: true }).data;
                
                document.getElementById('status-text').innerText = "Last Sync: " + new Date().toLocaleTimeString();

                if (data.length > 0) {
                    const latestRowIndex = data.length - 1;
                    const latestAlert = data[latestRowIndex];
                    
                    // MEMORY CHECK: Don't show if this row index was already acknowledged
                    const lastAck = localStorage.getItem('lastAckAlertRow');
                    
                    if (lastAck === null || parseInt(lastAck) < latestRowIndex) {
                        triggerAlertUI(latestAlert, latestRowIndex);
                    }
                }
            } catch (err) { 
                console.error("Alert Sync Error:", err); 
            }
        }

        function triggerAlertUI(alert, rowIndex) {
            const overlay = document.getElementById('match-alert-overlay');
            
            // Only trigger if not already visible
            if (overlay.style.display === "flex") return;

            const issue = alert['Issue'] || "NO DESCRIPTION PROVIDED";
            const sevNum = String(alert['Severity #']).trim();

            document.getElementById('alert-issue-text').innerText = issue.toUpperCase();
            document.getElementById('alert-sev-badge').innerText = sevNum;
            
            // MAP BACKGROUND COLORS
            let bgColor = "var(--bg-color)";
            let borderColor = "white";

            switch(sevNum) {
                case "1": bgColor = "var(--sev-1)"; break;
                case "2": bgColor = "var(--sev-2)"; break;
                case "3": bgColor = "var(--sev-3)"; break;
                case "4": bgColor = "var(--sev-4)"; break;
                case "5": 
                    bgColor = "var(--sev-5)"; 
                    borderColor = "var(--gold)"; // Black needs a gold border to pop
                    break;
                default: bgColor = "#333"; // Fallback
            }

            overlay.style.backgroundColor = bgColor;
            overlay.style.borderColor = borderColor;
            
            // Store index for LocalStorage memory
            overlay.dataset.rowIndex = rowIndex;
            overlay.style.display = "flex";

            // AUTO-DISMISS AFTER 5 MINUTES
            clearTimeout(autoDismissTimer);
            autoDismissTimer = setTimeout(() => {
                dismissPitAlert();
            }, 300000); 
        }

        function dismissPitAlert() {
            const overlay = document.getElementById('match-alert-overlay');
            const rowIndex = overlay.dataset.rowIndex;
            
            // Save to browser memory so it doesn't pop up again
            if (rowIndex !== undefined) {
                localStorage.setItem('lastAckAlertRow', rowIndex);
            }

            overlay.style.display = "none";
            clearTimeout(autoDismissTimer);
        }

        // Check for alerts every 10 seconds
        setInterval(checkPitAlerts, 10000);
        
        // Initial Check
        checkPitAlerts();
    </script>
</body>
</html>
