<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3824 Strategy Dashboard - Live Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #080808; --card-bg: #141414;
            --red-alliance: #ff4d4d; --blue-alliance: #4d94ff;
            --gold: #ffc107; --text: #ffffff;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        .dashboard-wrapper { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 8px; gap: 8px; }

        /* HEADER */
        .header { flex: none; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 8px 15px; border-radius: 6px; border-bottom: 3px solid var(--gold); }
        .header-controls { display: flex; flex-direction: column; gap: 4px; }
        .match-select { padding: 4px; border-radius: 4px; background: #222; color: white; border: 1px solid var(--gold); font-weight: bold; }
        .win-prob-container { width: 300px; text-align: center; }
        .prob-bar { width: 100%; height: 16px; background: #333; border-radius: 8px; overflow: hidden; display: flex; margin: 4px 0; }

        /* LIVE TRACKER BANNER */
        .live-banner { flex: none; background: #1f1f1f; color: var(--text); border-radius: 6px; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; font-weight: bold; font-size: 1.1rem; }
        .live-banner.queueing { animation: flash 1s infinite; border-color: #d32f2f; color: white; }
        .live-banner button { display: none; padding: 6px 15px; font-weight: bold; background: white; color: #d32f2f; border: none; border-radius: 4px; cursor: pointer; }
        .live-banner.queueing button { display: inline-block; }
        @keyframes flash { 0% { background: #d32f2f; } 50% { background: #ff5252; } 100% { background: #d32f2f; } }

        /* CONTENT GRID */
        .content-grid { flex: 1 1 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1.2fr 0.8fr; gap: 8px; min-height: 0; }
        .card { background: var(--card-bg); padding: 10px; border-radius: 6px; display: flex; flex-direction: column; min-height: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .combined-card { grid-column: 1 / -1; } 
        .red-card { border-left: 4px solid var(--red-alliance); }
        .blue-card { border-left: 4px solid var(--blue-alliance); }
        
        h3 { flex: none; margin: 0 0 6px 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        h1 { margin: 0; color: var(--gold); font-size: 1.2rem; }
        .red-text { color: var(--red-alliance); } .blue-text { color: var(--blue-alliance); }
        
        .chart-container { flex: 1 1 0; position: relative; width: 100%; height: 100%; min-height: 0; }
        .bottom-row-content { display: flex; flex: 1 1 0; gap: 8px; min-height: 0; }
        .badge-grid { flex: 0 0 90px; display: grid; grid-template-rows: repeat(3, 1fr); gap: 4px; min-height: 0; }
        .citrus-badge { display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 4px; font-weight: bold; font-size: 0.75em; border: 1px solid rgba(255,255,255,0.1); color: #fff; text-shadow: 1px 1px 2px black;}
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="header">
            <div>
                <h1>3824 STRATEGY</h1>
                <div class="header-controls">
                    <select id="match-selector" class="match-select" onchange="updateDashboard()"></select>
                    <span id="status-text" style="font-size:0.7em; color:#777;">Syncing...</span>
                </div>
            </div>
            <div class="win-prob-container">
                <div style="display:flex; justify-content: space-between; font-weight: bold; font-size: 0.8rem;">
                    <span class="red-text">RED EPA: <span id="red-epa-val">0</span></span>
                    <span class="blue-text">BLUE EPA: <span id="blue-epa-val">0</span></span>
                </div>
                <div class="prob-bar">
                    <div id="red-fill" style="width: 50%; background: var(--red-alliance); transition: 1s;"></div>
                    <div id="blue-fill" style="width: 50%; background: var(--blue-alliance); transition: 1s;"></div>
                </div>
                <div style="display:flex; justify-content: space-between; font-size: 0.8em;">
                    <span id="red-prob-text">50%</span><span id="blue-prob-text">50%</span>
                </div>
            </div>
        </div>

        <div id="live-banner" class="live-banner">
            <div>
                <span>Field Match: <span id="field-match" style="color:var(--gold);">--</span></span>
                <span style="margin: 0 10px; color: #444;">|</span>
                <span>Next 3824 Match ID: <span id="target-match" style="color:var(--gold);">--</span></span>
            </div>
            <div id="queue-status-text">MATCHES AWAY: <span id="matches-away">--</span></div>
            <button onclick="dismissWarning()">ON OUR WAY!</button>
        </div>

        <div class="content-grid">
            <div class="card combined-card">
                <h3>Alliance Combined Scoring Potential</h3>
                <div class="chart-container"><canvas id="combinedScoringChart"></canvas></div>
            </div>

            <div class="card red-card">
                <h3 class="red-text">Red Individual Breakdown</h3>
                <div class="chart-container"><canvas id="redBreakdownChart"></canvas></div>
            </div>
            <div class="card blue-card">
                <h3 class="blue-text">Blue Individual Breakdown</h3>
                <div class="chart-container"><canvas id="blueBreakdownChart"></canvas></div>
            </div>

            <div class="card red-card">
                <h3 class="red-text">Red Nav & Citrus</h3>
                <div class="bottom-row-content">
                    <div class="chart-container"><canvas id="redNavChart"></canvas></div>
                    <div id="red-citrus" class="badge-grid"></div>
                </div>
            </div>
            <div class="card blue-card">
                <h3 class="blue-text">Blue Nav & Citrus</h3>
                <div class="bottom-row-content">
                    <div class="chart-container"><canvas id="blueNavChart"></canvas></div>
                    <div id="blue-citrus" class="badge-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const AVERAGES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFDHMJqYQfAOO-7AcFcX9VXyuxIZQ9AuJ21BLhdIoZA-mXa_B6NijbOj0ZWmK_SQlt-gEXMf21ei_/pub?gid=131746992&single=true&output=csv";
        const LIVE_EXPORT_URL = "YOUR_LIVE_EXPORT_CSV_LINK_HERE"; 

        let charts = {};
        let teamDataCache = [];
        let scheduleData = [];
        let dismissedMatch = -1;

        async function fetchData() {
            try {
                // Fetch Stats
                const avgRes = await fetch(AVERAGES_URL);
                const avgData = Papa.parse(await avgRes.text(), { header: true, dynamicTyping: true }).data;
                teamDataCache = avgData;

                // Fetch Live Schedule
                const liveRes = await fetch(LIVE_EXPORT_URL);
                const liveData = Papa.parse(liveRes.ok ? await liveRes.text() : "", { header: true, dynamicTyping: true }).data;

                if (liveData.length > 0) {
                    processLiveSchedule(liveData);
                    document.getElementById('status-text').innerText = "Last Sync: " + new Date().toLocaleTimeString();
                    updateDashboard();
                }
            } catch (e) {
                document.getElementById('status-text').innerText = "Sync Error!";
                console.error(e);
            }
        }

        function processLiveSchedule(data) {
            // 1. Update Field Info from provided headers
            const currentMatch = data[0]['Current Match Number'] || 0;
            document.getElementById('field-match').innerText = currentMatch;

            // 2. Parse the schedule
            scheduleData = data.map(row => {
                // Handle "Team, Team, Team" strings
                const splitTeams = (str) => str ? str.toString().split(',').map(t => parseInt(t.trim())) : [0,0,0];
                return {
                    id: row['Match ID'],
                    redTeams: splitTeams(row['Red Alliance']),
                    blueTeams: splitTeams(row['Blue Alliance']),
                    redEPA: row['Red EPA'],
                    blueEPA: row['Blue EPA'],
                    away: row['Matches Until 3824']
                };
            }).filter(m => m.id);

            // 3. Populate Selector
            const selector = document.getElementById('match-selector');
            const currentVal = selector.value;
            selector.innerHTML = '';
            
            scheduleData.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.innerText = `Match ${m.id}`;
                selector.appendChild(opt);
            });

            // 4. Handle Next Match Logic
            // Find row where "Matches Until 3824" is lowest non-negative number
            const nextMatch = scheduleData.filter(m => m.away >= 0).sort((a,b) => a.away - b.away)[0];
            
            if (nextMatch) {
                if (!currentVal) selector.value = nextMatch.id;
                document.getElementById('target-match').innerText = nextMatch.id;
                document.getElementById('matches-away').innerText = nextMatch.away;

                const banner = document.getElementById('live-banner');
                if (nextMatch.away >= 0 && nextMatch.away <= 2 && dismissedMatch !== nextMatch.id) {
                    banner.classList.add('queueing');
                    document.getElementById('queue-status-text').innerText = `⚠️ QUEUE WARNING: ${nextMatch.away} AWAY ⚠️`;
                } else {
                    banner.classList.remove('queueing');
                    document.getElementById('queue-status-text').innerText = `MATCHES AWAY: ${nextMatch.away}`;
                }
            }
        }

        function updateDashboard() {
            const matchId = document.getElementById('match-selector').value;
            const match = scheduleData.find(m => m.id == matchId);
            if (!match) return;

            const getT = (num) => teamDataCache.find(t => t['Team Number'] == num) || 
                                {"Avg Auto":0,"Avg Teleop":0,"Avg Endgame":0,"Avg Total":0,"Bump %":0,"Trench %":0,"Avg Citrus":1};
            
            const rD = match.redTeams.map(getT);
            const bD = match.blueTeams.map(getT);

            // EPA display (using sheet's EPA values)
            document.getElementById('red-epa-val').innerText = match.redEPA ? match.redEPA.toFixed(1) : "0";
            document.getElementById('blue-epa-val').innerText = match.blueEPA ? match.blueEPA.toFixed(1) : "0";
            
            const rProb = Math.round((1 / (1 + Math.pow(10, (-(match.redEPA - match.blueEPA) / 65)))) * 100);
            document.getElementById('red-fill').style.width = rProb + "%";
            document.getElementById('blue-fill').style.width = (100 - rProb) + "%";
            document.getElementById('red-prob-text').innerText = rProb + "%";
            document.getElementById('blue-prob-text').innerText = (100 - rProb) + "%";

            renderCharts(match.redTeams, match.blueTeams, rD, bD);
            renderBadges(match.redTeams, match.blueTeams);
        }

        const toPct = (v) => (v <= 1.1) ? (v * 100).toFixed(0) : v.toFixed(0);

        function renderCharts(rLabs, bLabs, rD, bD) {
            Object.values(charts).forEach(c => c.destroy());
            const sum = (d, k) => d.reduce((s, t) => s + (t[k] || 0), 0);
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { stacked: true, ticks: {color: '#fff', font: {size: 10}} }, y: { stacked: true, ticks: {color: '#fff', font: {size: 10}} } } };

            charts.comb = new Chart(document.getElementById('combinedScoringChart'), {
                type: 'bar', data: { labels: ['Red', 'Blue'], datasets: [
                    { label: 'Auto', data: [sum(rD, 'Avg Auto'), sum(bD, 'Avg Auto')], backgroundColor: '#FFD700' },
                    { label: 'Teleop', data: [sum(rD, 'Avg Teleop'), sum(bD, 'Avg Teleop')], backgroundColor: '#42a5f5' },
                    { label: 'End', data: [sum(rD, 'Avg Endgame'), sum(bD, 'Avg Endgame')], backgroundColor: '#66bb6a' }
                ]}, options: { ...opt, plugins: { legend: { display: true, position: 'bottom', labels: {color: '#fff', boxWidth: 10}} } }
            });

            const breakdown = (id, labs, dat) => new Chart(document.getElementById(id), {
                type: 'bar', data: { labels: labs, datasets: [
                    { label: 'Auto', data: dat.map(d => d['Avg Auto']), backgroundColor: '#FFD700' },
                    { label: 'Teleop', data: dat.map(d => d['Avg Teleop']), backgroundColor: '#42a5f5' },
                    { label: 'End', data: dat.map(d => d['Avg Endgame']), backgroundColor: '#66bb6a' }
                ]}, options: opt
            });
            charts.rB = breakdown('redBreakdownChart', rLabs, rD);
            charts.bB = breakdown('blueBreakdownChart', bLabs, bD);

            const nav = (id, labs, dat) => new Chart(document.getElementById(id), {
                type: 'bar', data: { labels: labs, datasets: [
                    { label: 'Bump', data: dat.map(d => toPct(d['Bump %'] || 0)), backgroundColor: '#ef5350' },
                    { label: 'Trench', data: dat.map(d => toPct(d['Trench %'] || 0)), backgroundColor: '#ab47bc' }
                ]}, options: { ...opt, indexAxis: 'y', scales: { x: { max:100, ticks:{color:'#fff', font:{size:9}} }, y: { ticks:{color:'#fff', font:{size:10}} } } }
            });
            charts.rN = nav('redNavChart', rLabs, rD);
            charts.bN = nav('blueNavChart', bLabs, bD);
        }

        function renderBadges(red, blue) {
            const getShade = (v) => v <= 1.4 ? "#1b5e20" : v <= 2.2 ? "#4caf50" : "#a5d6a7";
            const draw = (list, id) => {
                const el = document.getElementById(id); el.innerHTML = '';
                list.forEach(n => {
                    const t = teamDataCache.find(x => x['Team Number'] == n) || {"Avg Citrus": 1};
                    const rnk = parseFloat(t["Avg Citrus"] || 1).toFixed(1);
                    el.innerHTML += `<div class="citrus-badge" style="background:${getShade(rnk)}">T-${n}<br>${rnk}</div>`;
                });
            };
            draw(red, 'red-citrus'); draw(blue, 'blue-citrus');
        }

        function dismissWarning() {
            dismissedMatch = document.getElementById('match-selector').value;
            document.getElementById('live-banner').classList.remove('queueing');
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
