    <style>
        :root {
            --bg-color: #080808; --card-bg: #141414;
            --red-alliance: #ff4d4d; --blue-alliance: #4d94ff;
            --gold: #ffc107; --text: #ffffff;

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        /* ALERT OVERLAYS */
        .alert-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10000; display: none; justify-content: center; align-items: center;
            flex-direction: column; text-align: center; padding: 20px;
        }
        .alert-content { width: 100%; max-width: 95vw; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .alert-title { font-size: 2rem; font-weight: 900; margin: 0; color: white; text-transform: uppercase; }
        .alert-subsystem { font-size: 3rem; color: white; text-transform: uppercase; font-weight: bold; margin: 0; }
        .alert-severity-tag { font-size: 2.5rem; padding: 10px 40px; display: inline-block; margin: 10px 0; color: white; font-weight: 900; border: 3px solid white; border-radius: 15px; }
        .alert-issue { font-size: 3.5rem; font-weight: bold; color: white; line-height: 1.2; width: 100%; white-space: normal; word-wrap: break-word; word-break: break-word; margin: 15px 0; padding: 0 10px; }
        .alert-dismiss { margin-top: 20px; font-size: 1.5rem; padding: 15px 40px; cursor: pointer; background: transparent; border: 3px solid white; font-weight: bold; border-radius: 10px; color: white; transition: 0.2s; }
        .alert-dismiss:hover { background: white; color: black; }
